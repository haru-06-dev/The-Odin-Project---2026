<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links and Images</title>
</head>
<body>
    <h1>Homepage</h1>
    <h3>Links:</h3>
    <!-- creating links -->
    <!-- anchor elements -->
    <!-- Absolute Links External/full directions including protocol(https --https://town.com/museum/shops/coffee_shop.html 
     think of it like a full path that includes https and domain name)-->
    <a href="https://www.theodinproject.com/about" target="_blank" rel="noreferrer">About The Odin Project</a> <!-- absolute link -->
    <!-- rel attribute above  "its like a security thing" -me
    This attribute is used to describe the relation between the current page and the linked document -->
    <!-- noopener - prevents new tab from accesssing the original page -->
    <!-- noreferrer -prevents certain details about the original page from being passed to the new page -->

    <!-- Relative Links Internal/directions from the current room(/1/2/3)-->
    <!-- Links to other pages within our own website are called relative links. Relative links do not include the domain name, since it is another page on the same site,
    it assumes the domain name will be the same as the page we created the link on.
    Relative links only include the file path to the other page, relative to the page you are creating the link on. -->
    <a href="./pages/about.html">About</a>
    <h3>Images:</h3>
    <!-- void elements <img> -->
     <img src="./images/dog.jpg" alt="Dog" height="400" width="400">
</body>
</html>
