<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>
</head>
<body>
    <h1>Images</h1>

    <p>This page covers common image formats, but you may also be looking for 
        <a href="links.html">links</a> and 
        <a href="./misc/extras.html">useful extras</a>
    </p>
    <h2>JPGs</h2>

    <p>JPG images are good for photos</p>
    <img src="./images/mochi.jpg" alt="A mochi ball in a bubble" width="75">
    <!-- designed for handling large color palettes without exorbitantly increasing file size -->
    <!-- This makes them great for photos and images with lots of gradients in them -->
    <!-- JPGs don’t allow for transparent pixels, which you can see in the white edges of the image below if you look real close -->

    <h2>GIFs</h2>
    
    <p>GIFs are good for animations.</p>
    <img src="./images/mochi.gif" alt="A dancing mochi ball" height="148" width="148">
    <!-- go-to option for simple animations,
    limited in terms of color palette—never use them for photos,
    can’t have semi-opaque pixels,
    it’s usually better to use PNG images if you don’t need animation. -->

    <h2>PNGs</h2>

    <p>PNGs are good for diagrams and icons</p>

    <img src="./images/mochi.png" alt="A mochi ball" width="75">
    <!-- great for anything that’s not a photo or animated
    PNG file of the same quality (as perceived the human eye) would generally be bigger than an equivalent JPG file
    they do deal with opacity just fine, and they don’t have color palette limitations. 
    This makes them an excellent fit for icons, technical diagrams, logos, etc. -->

    <!-- Those 3 image formats above are pixel-based 
    it losses quality when dimension scale up or down-->

    <h2>SVGs</h2>

    <p>SVGs are <em>amazing</em>. Use them wherever you can.</p>

    <img src="./images/mochi.svg" alt="A mochi ball with Bézier handles" height="148" width="148">
    <!-- SVG is a vector-based graphics format, meaning it can scale up or down to any dimension without loss of quality.
    This property makes SVG images a wonderful tool for responsive design.
    They’re good for pretty much all the same use cases as PNGs, and you should use them whenever you can. -->

    <!-- There is one potential issue with SVGs: for them to display consistently across browsers,
    you need to convert any text fields to outlines using your image editor (e.g., Abode Illustrator or Sketch).
    If your images contain a lot of text (like the fancy screenshots in this tutorial),
    this can have a big impact on file size. -->


</body>
</html>
