<!DOCTYPE html> 
<!-- The doctype’s purpose is to tell the browser what version of HTML it should use to render the document. 
The latest version of HTML is HTML5, and the doctype for that version is <!DOCTYPE html> -->

<html lang="en">
<!-- This is what’s known as the root element of the document, meaning that every other element in the document will be a descendant of it. -->

<head>
<!-- 
<head> element is where we put important meta-information about our webpages, and "stuff required for our webpages to render correctly" in the browser.
Inside the <head>, we should not use any element that displays content on the webpage. 
-->

    <meta charset="UTF-8">
    <!-- Setting the encoding is very important because it ensures that the webpage will display special symbols and characters from different languages correctly in the browser. -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Document</title>

</head>

<body>
    <!-- The final element needed to complete the HTML boilerplate
    This is where all the content that will be displayed to users will go - the text, images, lists, links, and so on. -->
    <h1>Hello World!</h1>
    Lorem ipsum dolor sit, amet consectetur adipisicing elit. Quas soluta unde sint aperiam tempora assumenda explicabo ratione mollitia enim magnam. Deserunt totam omnis in? Quibusdam doloribus perferendis consequatur accusamus excepturi?
    
</body>

</html>
